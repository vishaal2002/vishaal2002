name: github-activity-readme

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch: {}

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          # Limit to pull requests and issues only — omits pushes/stars/watches
          FILTERS: "PullRequestEvent,IssuesEvent"